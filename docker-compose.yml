services:
  app:
    build: .
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST}
      PHX_SERVER: "true"
      PUBLIC_BASE_URL: https://${PHX_HOST}
      NTFY_BASE_URL: ${NTFY_BASE_URL:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC}
      DATABASE_PATH: /data/noisy_chirp.db
      SEED_ON_BOOT: "true"
      PORT: "4000"
    volumes:
      - app_data:/data
    restart: unless-stopped
    expose:
      - "4000"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      PHX_HOST: ${PHX_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - app

volumes:
  app_data:
  caddy_data:
  caddy_config:
